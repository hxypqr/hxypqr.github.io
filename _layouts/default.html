<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    {% assign asset_version = site.time | date: "%s" %}
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% include head-custom.html %}
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}?v={{ asset_version }}">
    <link rel="stylesheet" href="{{ '/assets/css/equations.css' | relative_url }}?v={{ asset_version }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper">
        <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a class="page-link" href="{{ "/blog/" | relative_url }}">Blog</a>
          <a class="page-link" href="{{ "/research/" | relative_url }}">Research</a>
          <a class="page-link" href="{{ "/" | relative_url }}">Homepage</a>
        </nav>
      </div>
    </header>

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper">
        <p>&copy; {{ site.title }}.</p>
      </div>
    </footer>
    <script src="{{ "/assets/js/main.js" | relative_url }}?v={{ asset_version }}"></script>
  </body>
</html>
