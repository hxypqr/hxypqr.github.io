---
layout: default
title: Blog Post
---

<div id="post-content">
  <p id="post-status" role="status">正在加载文章…</p>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    const postContent = document.getElementById('post-content');
    const postId = new URLSearchParams(window.location.search).get('id');

    function showError(message) {
        postContent.replaceChildren();
        const error = document.createElement('p');
        error.className = 'blog-error';
        error.textContent = message;
        const backLink = document.createElement('a');
        backLink.href = '/blog/';
        backLink.textContent = '返回文章列表';
        postContent.append(error, backLink);
    }

    if (!postContent) {
        return;
    }

    if (!postId || !/^\d+$/.test(postId)) {
        showError('文章链接无效。');
        return;
    }

    try {
        const parameters = new URLSearchParams({ _fields: 'id,date,title,content' });
        const response = await fetch(
            `${window.BlogApp.apiBase}/${encodeURIComponent(postId)}?${parameters.toString()}`,
            { headers: { Accept: 'application/json' } }
        );

        if (!response.ok) {
            throw new Error(`WordPress API returned ${response.status}`);
        }

        const post = await response.json();
        const title = window.BlogApp.decodeRenderedText(post.title && post.title.rendered);
        document.title = title || 'Blog Post';

        const postTitle = document.createElement('h1');
        postTitle.textContent = title;

        const postDate = document.createElement('time');
        postDate.className = 'post-date';
        postDate.dateTime = post.date;
        postDate.textContent = window.BlogApp.formatDate(post.date);

        const postBody = document.createElement('div');
        postBody.className = 'post-body';
        const renderedContent = post.content && post.content.rendered
            ? post.content.rendered
            : '';
        postBody.innerHTML = window.BlogApp.prepareRenderedHtml(renderedContent, post.id);

        window.BlogApp.enhanceLegacyLatex(postBody, post.id);
        postContent.replaceChildren(postTitle, postDate, postBody);
        window.BlogApp.enhanceInteractivePost(postBody, post.id, postTitle);
        window.BlogApp.renderMath(postContent);
    } catch (error) {
        console.error('Unable to load blog post:', error);
        showError('文章加载失败，文章可能不存在，或服务器暂时无法访问。');
    }
});
</script>
